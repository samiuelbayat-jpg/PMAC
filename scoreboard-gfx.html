<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMAC GFX Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0b0d;color:#eef0f5;font-family:'Barlow Condensed',sans-serif;min-height:100vh;}
.ctrl-wrap{max-width:1400px;margin:0 auto;padding:1.25rem;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;gap:1rem;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-logo{width:48px;height:48px;border-radius:50%;border:2px solid #00ff88;object-fit:cover;}
.hdr-title{font-weight:900;font-size:20px;letter-spacing:.04em;text-transform:uppercase;}
.hdr-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#00ff88;letter-spacing:.15em;margin-top:3px;}
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(135deg,#1e2329,#161a1f);border:1px solid rgba(255,255,255,0.15);color:#8a96a8;border-radius:6px;padding:8px 18px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:rgba(0,255,136,0.5);color:#eef0f5;}
.btn-green{background:linear-gradient(135deg,#00cc6a,#00aa55);border-color:#00ff88;color:#000;box-shadow:0 3px 12px rgba(0,255,136,0.3);}
.btn-green:hover{background:linear-gradient(135deg,#00ff88,#00cc6a);color:#000;}
.ctrls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1.25rem;background:#0f1115;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:1rem;}
.cf{display:flex;flex-direction:column;gap:4px;}
.cl{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#8a96a8;letter-spacing:.1em;text-transform:uppercase;}
.ci{background:#161a1f;border:1px solid rgba(255,255,255,0.12);color:#eef0f5;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;padding:6px 10px;border-radius:4px;outline:none;}
.ci:focus{border-color:#00ff88;}
.status{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#606878;margin-bottom:1rem;letter-spacing:.06em;}
#gfx-wrap{overflow-x:auto;margin-bottom:1.5rem;}
#gfx-scale-wrap{transform-origin:top left;display:inline-block;}

/* ══ GFX CANVAS 1920x1080 ══ */
#gfx{
  width:1920px;
  height:1080px;
  position:relative;
  overflow:hidden;
  font-family:'Barlow Condensed',sans-serif;
  background:#1a1a2e;
  flex-shrink:0;
}

/* BG */
.g-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0d0d1a 0%,#1a1a2e 40%,#0d1a0d 100%);}
.g-bg-dots{position:absolute;inset:0;opacity:.15;background-image:radial-gradient(circle,#00ff88 1px,transparent 1px);background-size:40px 40px;}
.g-bg-corner-tl{position:absolute;top:0;left:0;width:300px;height:300px;background:linear-gradient(135deg,#00ff88,transparent);opacity:.15;clip-path:polygon(0 0,100% 0,0 100%);}
.g-bg-corner-br{position:absolute;bottom:0;right:0;width:300px;height:300px;background:linear-gradient(315deg,#00ff88,transparent);opacity:.15;clip-path:polygon(100% 0,100% 100%,0 100%);}
.g-bg-corner-tr{position:absolute;top:0;right:0;width:200px;height:200px;background:linear-gradient(225deg,#00cc55,transparent);opacity:.1;clip-path:polygon(100% 0,100% 100%,0 0);}
.g-bg-corner-bl{position:absolute;bottom:0;left:0;width:200px;height:200px;background:linear-gradient(45deg,#00cc55,transparent);opacity:.1;clip-path:polygon(0 0,100% 100%,0 100%);}

/* HEADER */
.g-header{position:absolute;top:0;left:0;right:0;height:130px;z-index:5;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;}
.g-title-wrap{display:flex;align-items:center;gap:20px;}
.g-hlogo{width:70px;height:70px;border-radius:50%;border:3px solid #00ff88;object-fit:cover;box-shadow:0 0 20px rgba(0,255,136,0.4);}
.g-title-text{text-align:center;}
.g-title-main{font-weight:900;font-size:52px;letter-spacing:.08em;text-transform:uppercase;color:#fff;line-height:1;text-shadow:0 0 30px rgba(0,255,136,0.3);}
.g-title-sub{font-size:16px;letter-spacing:.3em;color:#00ff88;text-transform:uppercase;margin-top:2px;}
.g-header-divider{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#00ff88 20%,#fff 50%,#00ff88 80%,transparent);}

/* COL HEADERS */
.g-col-hdr{position:absolute;top:130px;height:36px;z-index:4;display:flex;align-items:center;background:rgba(0,0,0,0.5);border-bottom:2px solid #00ff88;}
.g-col-hdr-l{left:20px;width:920px;}
.g-col-hdr-r{left:980px;right:20px;}
.g-ch{font-weight:700;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#00ff88;}
.g-ch-num{width:56px;text-align:center;}
.g-ch-logo{width:56px;}
.g-ch-name{flex:1;padding-left:8px;}
.g-ch-plc{width:60px;text-align:center;}
.g-ch-kls{width:60px;text-align:center;}
.g-ch-tot{width:72px;text-align:center;color:#fff;}
.g-ch-win{width:52px;text-align:center;color:#ffd700;}

/* TEAM COLUMNS */
.g-teams-l{position:absolute;top:166px;left:20px;width:920px;z-index:3;}
.g-teams-r{position:absolute;top:166px;left:980px;right:20px;z-index:3;}

/* TEAM ROW */
.g-row{display:flex;align-items:center;height:88px;border-bottom:1px solid rgba(255,255,255,0.06);position:relative;transition:all .2s;}
.g-row:nth-child(even){background:rgba(255,255,255,0.02);}
.g-r1{background:linear-gradient(90deg,rgba(0,255,136,0.18),rgba(0,255,136,0.05),transparent) !important;}
.g-r2{background:linear-gradient(90deg,rgba(192,192,192,0.12),rgba(192,192,192,0.03),transparent) !important;}
.g-r3{background:linear-gradient(90deg,rgba(205,127,50,0.15),rgba(205,127,50,0.03),transparent) !important;}
.g-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;}
.g-r1 .g-stripe{background:linear-gradient(180deg,#00ff88,#00aa55);}
.g-r2 .g-stripe{background:linear-gradient(180deg,#d0d0d0,#808080);}
.g-r3 .g-stripe{background:linear-gradient(180deg,#ffa500,#cc6600);}

/* ROW ELEMENTS */
.g-num{width:56px;text-align:center;flex-shrink:0;}
.g-num-inner{font-weight:900;font-size:13px;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:4px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.g-r1 .g-num-inner{background:rgba(0,255,136,0.15);border-color:rgba(0,255,136,0.4);color:#00ff88;font-size:14px;}
.g-r2 .g-num-inner{background:rgba(192,192,192,0.1);border-color:rgba(192,192,192,0.3);color:#d0d0d0;}
.g-r3 .g-num-inner{background:rgba(205,127,50,0.1);border-color:rgba(205,127,50,0.3);color:#ffa500;}
.g-logo{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.g-lc{width:52px;height:52px;border-radius:50%;border:2px solid rgba(0,255,136,0.3);background:#161a1f;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#00ff88;overflow:hidden;}
.g-lc img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.g-name{flex:1;padding-left:8px;min-width:0;}
.g-tname{font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.04em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-plc{width:60px;text-align:center;flex-shrink:0;font-weight:700;font-size:20px;color:#aab0bc;}
.g-kls{width:60px;text-align:center;flex-shrink:0;font-weight:700;font-size:20px;color:#ff6040;}
.g-tot{width:72px;text-align:center;flex-shrink:0;}
.g-tot-n{font-weight:900;font-size:26px;color:#00ff88;line-height:1;}
.g-r1 .g-tot-n{font-size:30px;text-shadow:0 0 15px rgba(0,255,136,0.5);}
.g-win{width:52px;text-align:center;flex-shrink:0;font-weight:800;font-size:14px;color:#ffd700;}

/* CENTER DIVIDER */
.g-divider{position:absolute;top:130px;bottom:50px;left:960px;width:2px;background:linear-gradient(180deg,#00ff88,rgba(0,255,136,0.3),#00ff88);z-index:4;box-shadow:0 0 10px rgba(0,255,136,0.3);}

/* FOOTER */
.g-footer{position:absolute;bottom:0;left:0;right:0;height:50px;z-index:5;background:rgba(0,0,0,0.6);border-top:2px solid #00ff88;display:flex;align-items:center;justify-content:space-between;padding:0 30px;}
.g-ftxt{font-size:12px;color:rgba(0,255,136,0.5);letter-spacing:.12em;text-transform:uppercase;}
.g-pts-key{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:.06em;}

.toast{position:fixed;bottom:2rem;right:2rem;z-index:2000;font-weight:700;font-size:14px;padding:10px 20px;border-radius:6px;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none;font-family:'Barlow Condensed',sans-serif;}
.toast.show{transform:translateY(0);opacity:1;}
.tok{background:#00ff88;color:#000;}.terr{background:#ff4444;color:#fff;}
</style>
</head>

document.getElementById("dl-btn").onclick = function() {
  var btn = this;
  btn.textContent = "Generating..."; btn.disabled = true;
  var gfx = document.getElementById("gfx");
  var wrap = document.getElementById("gfx-scale-wrap");
  // Temporarily reset scale to 1 for full resolution capture
  var oldTransform = wrap.style.transform;
  var oldHeight = wrap.style.height;
  wrap.style.transform = "scale(1)";
  wrap.style.height = "1080px";
  gfx.style.width = "1920px";
  gfx.style.height = "1080px";
  setTimeout(function() {
    html2canvas(gfx, {
      scale: 1, useCORS: true, allowTaint: true,
      backgroundColor: document.getElementById("inp-bg").value,
      width: 1920, height: 1080, logging: false, imageTimeout: 15000,
      windowWidth: 1920, windowHeight: 1080
    }).then(function(canvas) {
      // Restore scale
      wrap.style.transform = oldTransform;
      wrap.style.height = oldHeight;
      // Ensure output is exactly 1920x1080
      var out = document.createElement("canvas");
      out.width = 1920; out.height = 1080;
      var ctx = out.getContext("2d");
      ctx.fillStyle = document.getElementById("inp-bg").value || "#1a1a2e";
      ctx.fillRect(0,0,1920,1080);
      ctx.drawImage(canvas, 0, 0, 1920, 1080);
      var a = document.createElement("a");
      var t = (document.getElementById("inp-title").value || "PMAC").replace(/ /g,"_");
      a.download = "PMAC_GFX_" + t + "_1920x1080.png";
      a.href = out.toDataURL("image/png");
      a.click();
      btn.textContent = "⬇ Download PNG"; btn.disabled = false;
      toast("Downloaded 1920x1080!", true);
    }).catch(function(e) {
      wrap.style.transform = oldTransform;
      wrap.style.height = oldHeight;
      btn.textContent = "⬇ Download PNG"; btn.disabled = false;
      toast("Error: " + e.message, false);
    });
  }, 200);
};

function applyColors() {
  var bg = document.getElementById("inp-bg").value;
  var ac = document.getElementById("inp-accent").value;
  var gfx = document.getElementById("gfx");
  gfx.querySelector(".g-bg").style.background = "linear-gradient(135deg," + bg + " 0%," + shadeColor(bg,20) + " 40%," + bg + " 100%)";
  // Update accent elements
  gfx.querySelectorAll(".g-header-divider").forEach(function(e){e.style.background="linear-gradient(90deg,transparent,"+ac+" 20%,#fff 50%,"+ac+" 80%,transparent)";});
  gfx.querySelectorAll(".g-divider").forEach(function(e){e.style.background="linear-gradient(180deg,"+ac+",rgba(0,0,0,0.2),"+ac+")";e.style.boxShadow="0 0 10px "+ac+"44";});
}

function shadeColor(color, percent) {
  var num = parseInt(color.replace("#",""),16);
  var amt = Math.round(2.55 * percent);
  var R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
  return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
}

function san(n) { return n.replace(/[.#$\/\[\]]/g,"_"); }

function getStandings() {
  return teams.map(function(t) {
    var key = san(t.name), md = scores[key] || [], tk = 0, tp = 0, wins = 0;
    for (var i = 0; i < 10; i++) {
      var m = md[i] || {rank:null,kills:null};
      var rp = (m.rank && m.rank >= 1 && m.rank <= 25) ? RANK_PTS[m.rank-1] : 0;
      var kp = m.kills ? parseInt(m.kills)||0 : 0;
      if (m.rank != null || m.kills != null) { tp += rp + kp; tk += kp; }
      if (m.rank == 1) wins++;
    }
    return {name:t.name, logo:t.logo||"", kills:tk, pts:tp, plc:tp-tk, wins:wins};
  }).sort(function(a,b){return b.pts-a.pts||b.kills-a.kills;});
}

function build() {
  if (!teamsReady || !scoresReady) return;
  var st = getStandings();
  if (!st.length) { document.getElementById("status").textContent = "No teams found."; return; }
  buildWithLogos(st);
}

function buildWithLogos(st) {
  var logoCache = {};

  var title = document.getElementById("inp-title").value || eventInfo.name || "PMAC TOURNAMENT";
  var sub = document.getElementById("inp-sub").value || "Overall Rankings";

  var gfx = document.getElementById("gfx");
  gfx.style.background = "linear-gradient(135deg,"+bg+" 0%,"+shadeColor(bg,15)+" 40%,"+bg+" 100%)";
  gfx.innerHTML = "";

  // BG layers
  gfx.innerHTML +=
    '<div class="g-bg" style="background:linear-gradient(135deg,'+bg+' 0%,'+shadeColor(bg,15)+' 40%,'+bg+' 100%);"></div>'+
    '<div class="g-bg-dots"></div>'+
    '<div class="g-bg-corner-tl" style="background:linear-gradient(135deg,'+accent+',transparent);"></div>'+
    '<div class="g-bg-corner-br" style="background:linear-gradient(315deg,'+accent+',transparent);"></div>'+
    '<div class="g-bg-corner-tr" style="background:linear-gradient(225deg,'+accent+',transparent);"></div>'+
    '<div class="g-bg-corner-bl" style="background:linear-gradient(45deg,'+accent+',transparent);"></div>';

  // Header
  gfx.innerHTML +=
    '<div class="g-header">'+
      '<div class="g-title-wrap">'+
        '<img class="g-hlogo" src="'+LOGO+'" alt="PMAC">'+
        '<div class="g-title-text">'+
          '<div class="g-title-main" style="color:#fff;text-shadow:0 0 30px '+accent+'44;">'+title+'</div>'+
          '<div class="g-title-sub" style="color:'+accent+';letter-spacing:.3em;">'+sub+'</div>'+
        '</div>'+
        '<img class="g-hlogo" src="'+LOGO+'" alt="PMAC">'+
      '</div>'+
      '<div class="g-header-divider" style="background:linear-gradient(90deg,transparent,'+accent+' 20%,#fff 50%,'+accent+' 80%,transparent);"></div>'+
    '</div>';

  // Column headers
  var chRow =
    '<div class="g-ch g-ch-num">#</div>'+
    '<div class="g-ch g-ch-logo"></div>'+
    '<div class="g-ch g-ch-name">Team Name</div>'+
    '<div class="g-ch g-ch-plc" style="color:'+accent+';">PLC</div>'+
    '<div class="g-ch g-ch-kls" style="color:#ff6040;">KILLS</div>'+
    '<div class="g-ch g-ch-tot" style="color:#fff;">TOTAL</div>'+
    '<div class="g-ch g-ch-win" style="color:#ffd700;">🏆</div>';
  gfx.innerHTML +=
    '<div class="g-col-hdr g-col-hdr-l" style="border-bottom-color:'+accent+';">'+chRow+'</div>'+
    '<div class="g-col-hdr g-col-hdr-r" style="border-bottom-color:'+accent+';">'+chRow+'</div>';

  // Center divider
  gfx.innerHTML += '<div class="g-divider" style="background:linear-gradient(180deg,'+accent+',rgba(0,0,0,0.1),'+accent+');box-shadow:0 0 10px '+accent+'44;"></div>';

  // Teams
  var leftDiv = document.createElement("div");
  leftDiv.className = "g-teams-l";
  var rightDiv = document.createElement("div");
  rightDiv.className = "g-teams-r";

  var maxTeams = Math.min(st.length, 20);
  var half = Math.ceil(maxTeams / 2);
  var leftCount = half;
  var rightCount = maxTeams - half;
  var rowH = Math.floor(870 / Math.max(leftCount, rightCount, 1));

  for (var i = 0; i < maxTeams; i++) {
    var t = st[i];
    var pos = i + 1;
    var rcls = pos===1?"g-r1":pos===2?"g-r2":pos===3?"g-r3":"";
    var numStyle = pos<=3 ? "" : "style='color:rgba(255,255,255,0.4);font-size:16px;'";

    var initials = t.name.substring(0,2);
    var logoHtml = t.logo
      ? '<img src="'+t.logo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
      : initials;

    var winStr = t.wins > 0 ? t.wins+"X" : "0X";
    var winColor = t.wins > 0 ? "#ffd700" : "rgba(255,255,255,0.2)";

    var row = document.createElement("div");
    row.className = "g-row " + rcls;
    row.style.height = rowH + "px";
    row.innerHTML =
      '<div class="g-stripe" style="background:'+(pos===1?'linear-gradient(180deg,'+accent+','+shadeColor(accent,-20)+')':pos===2?'linear-gradient(180deg,#d0d0d0,#808080)':pos===3?'linear-gradient(180deg,#ffa500,#cc6600)':'rgba(255,255,255,0.06)')+';"></div>'+
      '<div class="g-num"><div class="g-num-inner" '+numStyle+'>'+String(pos).padStart(2,"0")+'</div></div>'+
      '<div class="g-logo"><div class="g-lc" style="border-color:'+(pos===1?accent:pos===2?'#d0d0d0':pos===3?'#ffa500':'rgba(255,255,255,0.1)')+';color:'+accent+';">'+logoHtml+'</div></div>'+
      '<div class="g-name"><div class="g-tname">'+t.name+'</div></div>'+
      '<div class="g-plc" style="color:'+(pos===1?accent:'#aab0bc')+';font-size:'+(rowH>60?'22':'18')+'px;">'+t.plc+'</div>'+
      '<div class="g-kls" style="font-size:'+(rowH>60?'22':'18')+'px;">'+t.kills+'</div>'+
      '<div class="g-tot"><div class="g-tot-n" style="color:'+accent+';font-size:'+(pos===1?(rowH>60?'32':'26'):(rowH>60?'26':'22'))+'px;'+(pos===1?'text-shadow:0 0 15px '+accent+'88;':'')+'">'+(t.pts)+'</div></div>'+
      '<div class="g-win" style="color:'+winColor+';font-size:'+(rowH>60?'16':'13')+'px;">'+winStr+'</div>';

    if (i < half) leftDiv.appendChild(row);
    else rightDiv.appendChild(row);
  }

  gfx.appendChild(leftDiv);
  gfx.appendChild(rightDiv);

  // Footer
  var foot = document.createElement("div");
  foot.className = "g-footer";
  foot.innerHTML =
    '<div class="g-ftxt" style="color:'+accent+'88;">'+title+' — Official Standings</div>'+
    '<div class="g-pts-key">#1=10pts  #2=6pts  #3=5pts  #4=4pts  #5=3pts  #6=2pts  #7-8=1pt  +1/kill</div>'+
    '<div class="g-ftxt" style="color:'+accent+'88;">'+today+'</div>';
  gfx.appendChild(foot);
  setTimeout(scaleGfx, 50);
}  // end buildWithLogos

function scaleGfx() {
  var wrap = document.getElementById("gfx-scale-wrap");
  var container = document.getElementById("gfx-wrap");
  if (!wrap) return;
  var available = container.clientWidth || window.innerWidth - 40;
  var scale = Math.min(1, (available * 0.72) / 1920);
  wrap.style.transform = "scale(" + scale + ")";
  wrap.style.height = (1080 * scale) + "px";
  wrap.style.width = "1920px";
  container.style.height = (1080 * scale) + "px";
}
window.addEventListener("resize", scaleGfx);

function toast(msg, ok) {
  var t = document.getElementById("toast");
  t.innerHTML = msg; t.className = "toast show " + (ok?"tok":"terr");
  setTimeout(function(){t.classList.remove("show");},3000);
}
</script>
</body>
</html>
