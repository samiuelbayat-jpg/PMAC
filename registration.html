<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMAF Community - PUBG Mobile Afghanistan</title>

  <!-- PUBG Google Font -->
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap)" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Rajdhani", sans-serif;
      color: #f2f2f2;
      background: url("[i.imgur.com](https://i.imgur.com/4y8rBqP.jpeg)") no-repeat center center/cover;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    /* Animated intro loader */
    #loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000 url("[i.imgur.com](https://i.imgur.com/5qByvLz.gif)") center/200px no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeOut 2.5s forwards 2.5s;
      z-index: 100;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    header {
      text-align: center;
      padding: 45px 20px 20px;
      background: rgba(0, 0, 0, 0.65);
      border-bottom: 2px solid #d4a84b;
    }

    header h1 {
      font-size: 42px;
      color: #ffdd77;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 15px #f5c96b, 0 0 30px #d4a84b;
      animation: glow 1.8s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #d4a84b; }
      to { text-shadow: 0 0 20px #ffdd77, 0 0 40px #d4a84b; }
    }

    header p {
      margin: 10px 0 0;
      font-size: 18px;
      color: #ccc;
    }

    main {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    section {
      background: rgba(25, 25, 25, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    h2, h3, h4 {
      color: #ffd86b;
      margin-top: 0;
      letter-spacing: 1px;
    }

    form label {
      display: block;
      margin: 10px 0 5px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      background: #111;
      border: 1px solid #555;
      color: #fff;
      border-radius: 5px;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #d4a84b, #f5c96b);
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #f5c96b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      text-align: center;
    }

    th {
      background: rgba(255, 215, 100, 0.1);
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #ccc;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }

    /* Responsive styling */
    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }
      section {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

<div id="loader"></div>

<header>
  <h1>PMAF Community</h1>
  <p>PUBG Mobile Afghanistan</p>
</header>

<main>
  <section id="event-section">
    <h2>Event Registration</h2>
    <form>
      <label>Event Name</label><input type="text" required>
      <label>Date</label><input type="date" required>
      <label>Max Teams</label><input type="number" required>
      <label>Prize Pool</label><input type="text">
      <label>Platform</label><input type="text">
      <label>Description</label><textarea></textarea>
      <label>Event Banner</label><input type="file" accept="image/*">
    </form>

    <h3>Register Your Team</h3>
    <form>
      <label>Team Name *</label><input type="text" required>
      <label>Team Tag *</label><input type="text" maxlength="5" required>
      <label>Manager *</label><input type="text" required>
      <label>Manager Phone *</label><input type="tel" required>
      <label>Team Logo (optional)</label><input type="file" accept="image/*">
      <button type="submit">Register</button>
    </form>
  </section>

  <section id="leaderboard">
    <h2>🏆 Best Teams - Lobby AFG</h2>
    <form>
      <label>Team Name *</label><input type="text" required>
      <label>Team Tag *</label><input type="text" required>
      <label>Manager *</label><input type="text" required>
      <label>Phone *</label><input type="tel" required>
      <label>Logo (optional)</label><input type="file" accept="image/*">
      <button>Add Team</button>
    </form>

    <table>
      <thead>
        <tr><th>#</th><th>Logo</th><th>Team</th><th>M1</th><th>M2</th><th>M3</th><th>Total</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="7">No teams registered yet</td></tr>
      </tbody>
    </table>
  </section>

  <section id="streamers">
    <h2>🔴 Afghan PUBG Mobile Streamers</h2>
    <p>Streamers list currently loading...</p>
    <form>
      <label>Streamer Name *</label><input type="text" required>
      <label>YouTube Channel ID *</label><input type="text" required>
      <label>TikTok Username</label><input type="text">
      <label>Profile Photo</label><input type="file" accept="image/*">
      <button>Add Streamer</button>
    </form>
  </section>

  <section id="remove-registration">
    <h2>Remove Registration</h2>
    <form>
      <label>Enter your 6-character delete code</label>
      <input type="text" maxlength="6" required>
      <button>Remove</button>
    </form>
  </section>
</main>

<footer>
  © 2026 PMAF Community — PUBG Mobile Afghanistan
</footer>

<script>
  // simple script to remove loader after fade animation
  window.addEventListener("load", () => {
    setTimeout(() => document.getElementById("loader").style.display = "none", 3500);
  });
</script>

</body>
</html>
